<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Chat</title>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, sans-serif;
        background: linear-gradient(180deg, #eef4ff 0%, #f7f9fc 100%);
        color: #1f2937;
        padding: 16px;
      }

      .app {
        width: 100%;
        max-width: 460px;
        background: #ffffff;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        overflow: hidden;
        display: grid;
        grid-template-rows: auto 1fr auto;
        height: min(92vh, 720px);
      }

      .app-header {
        padding: 16px 20px;
        border-bottom: 1px solid #e5e7eb;
        background: #f8fbff;
      }

      .app-header h1 {
        margin: 0;
        font-size: 22px;
      }

      .subtitle {
        margin: 8px 0 0;
        font-size: 14px;
        color: #4b5563;
      }

      .chat {
        padding: 16px;
        overflow-y: auto;
        background: #ffffff;
      }

      .empty-state {
        text-align: center;
        color: #6b7280;
        margin-top: 40px;
      }

      .message-row {
        display: flex;
        margin-bottom: 12px;
      }

      .message-row.mine {
        justify-content: flex-end;
      }

      .message-bubble {
        width: fit-content;
        max-width: 85%;
        padding: 10px 12px;
        border-radius: 12px;
        background: #e9f1ff;
        border: 1px solid #dbe6ff;
      }

      .message-row.mine .message-bubble {
        background: #dcfce7;
        border-color: #bbf7d0;
      }

      .message-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 4px;
      }

      .sender {
        font-size: 13px;
      }

      .meta {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .time {
        color: #6b7280;
        font-size: 12px;
      }

      .message-text {
        margin: 0;
        font-size: 14px;
        line-height: 1.45;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .delete-btn {
        border: none;
        background: transparent;
        color: #dc2626;
        font-size: 12px;
        cursor: pointer;
        padding: 0;
      }

      .delete-btn:hover {
        text-decoration: underline;
      }

      .composer {
        border-top: 1px solid #e5e7eb;
        padding: 12px;
        display: flex;
        gap: 8px;
        background: #f9fafb;
      }

      .composer input {
        flex: 1;
        border: 1px solid #d1d5db;
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 14px;
        outline: none;
      }

      .composer input:focus {
        border-color: #3b82f6;
      }

      .composer button {
        border: none;
        border-radius: 10px;
        background: #2563eb;
        color: #ffffff;
        padding: 0 18px;
        font-size: 14px;
        cursor: pointer;
      }

      .composer button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
    </style>
  </head>

  <body>
    <div class="app">
      <header class="app-header">
        <h1>💬 Simple Chat</h1>
        <p class="subtitle">Signed in as <strong id="userLabel"></strong></p>
      </header>

      <main id="chat" class="chat"></main>

      <form id="composerForm" class="composer" autocomplete="off">
        <input
          id="msgInput"
          type="text"
          placeholder="Type message..."
          maxlength="500"
        />
        <button id="sendBtn" type="submit">Send</button>
      </form>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
      let username = prompt("Enter your name");
      if (!username || !username.trim()) {
        username = "User";
      }
      username = username.trim();

      const firebaseConfig = {
        apiKey: "AIzaSyCCebvEorqcv1h_6e-tJQlo4MPG9WXiIf0",
        authDomain: "web-chat-93bab.firebaseapp.com",
        projectId: "web-chat-93bab",
      };

      firebase.initializeApp(firebaseConfig);
      const db = firebase.firestore();

      const userLabel = document.getElementById("userLabel");
      const chat = document.getElementById("chat");
      const composerForm = document.getElementById("composerForm");
      const msgInput = document.getElementById("msgInput");
      const sendBtn = document.getElementById("sendBtn");

      userLabel.textContent = username;

      function formatTime(timestamp) {
        if (!timestamp) return "";
        const date = new Date(timestamp);
        return date.toLocaleTimeString([], {
          hour: "2-digit",
          minute: "2-digit",
        });
      }

      async function sendMsg() {
        const text = msgInput.value.trim();
        if (!text) return;

        sendBtn.disabled = true;

        try {
          await db.collection("messages").add({
            name: username,
            message: text,
            time: Date.now(),
          });
          msgInput.value = "";
          msgInput.focus();
        } catch (error) {
          console.error("Send failed:", error);
          alert("Could not send the message. Please try again.");
        } finally {
          sendBtn.disabled = false;
        }
      }

      async function deleteMsg(messageId) {
        if (!messageId) return;

        const confirmed = confirm("Delete this message?");
        if (!confirmed) return;

        try {
          await db.collection("messages").doc(messageId).delete();
        } catch (error) {
          console.error("Delete failed:", error);
          alert("Could not delete the message. Please try again.");
        }
      }

      function createMessageElement(doc) {
        const data = doc.data();
        const isMine = data.name === username;

        const row = document.createElement("div");
        row.className = isMine ? "message-row mine" : "message-row";

        const bubble = document.createElement("div");
        bubble.className = "message-bubble";

        const head = document.createElement("div");
        head.className = "message-head";

        const sender = document.createElement("strong");
        sender.className = "sender";
        sender.textContent = data.name || "Unknown";

        const meta = document.createElement("div");
        meta.className = "meta";

        const time = document.createElement("span");
        time.className = "time";
        time.textContent = formatTime(data.time);
        meta.appendChild(time);

        if (isMine) {
          const deleteBtn = document.createElement("button");
          deleteBtn.type = "button";
          deleteBtn.className = "delete-btn";
          deleteBtn.dataset.id = doc.id;
          deleteBtn.textContent = "Delete";
          meta.appendChild(deleteBtn);
        }

        const text = document.createElement("p");
        text.className = "message-text";
        text.textContent = data.message || "";

        head.appendChild(sender);
        head.appendChild(meta);
        bubble.appendChild(head);
        bubble.appendChild(text);
        row.appendChild(bubble);

        return row;
      }

      composerForm.addEventListener("submit", function (event) {
        event.preventDefault();
        sendMsg();
      });

      chat.addEventListener("click", function (event) {
        const deleteButton = event.target.closest(".delete-btn");
        if (!deleteButton) return;
        deleteMsg(deleteButton.dataset.id);
      });

      db.collection("messages")
        .orderBy("time")
        .onSnapshot((snapshot) => {
          chat.innerHTML = "";

          if (snapshot.empty) {
            const emptyState = document.createElement("p");
            emptyState.className = "empty-state";
            emptyState.textContent = "No messages yet. Start the conversation!";
            chat.appendChild(emptyState);
            return;
          }

          snapshot.forEach((doc) => {
            chat.appendChild(createMessageElement(doc));
          });

          chat.scrollTop = chat.scrollHeight;
        });
    </script>
  </body>
</html>
